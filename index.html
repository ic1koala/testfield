<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オリジナルTOEIC対策テスト</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background-color: #f3f4f6;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .app-container {
      background-color: #ffffff;
      width: 100%;
      max-width: 500px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      padding: 30px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 20px;
      color: #1f2937;
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    
    .question-area { margin-bottom: 24px; }
    .question-number { font-size: 14px; color: #6b7280; font-weight: bold; margin-bottom: 8px; }
    .question-text { font-size: 18px; line-height: 1.5; font-weight: bold; margin-bottom: 20px; }
    
    .choices-container { display: flex; flex-direction: column; gap: 12px; }
    .choice-btn {
      background-color: #ffffff;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
    }
    .choice-btn:hover:not(:disabled) {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
    .choice-btn:disabled { cursor: not-allowed; }
    .choice-btn.correct { background-color: #dcfce7; border-color: #22c55e; color: #166534; }
    .choice-btn.wrong { background-color: #fee2e2; border-color: #ef4444; color: #991b1b; }

    .feedback { font-size: 18px; font-weight: bold; text-align: center; margin-top: 20px; min-height: 27px; }
    .feedback.text-green { color: #22c55e; }
    .feedback.text-red { color: #ef4444; }

    .next-btn, .action-btn {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .next-btn:hover, .action-btn:hover { background-color: #1d4ed8; }
    .next-btn .arrow-icon { transition: transform 0.3s ease; }
    .next-btn:hover .arrow-icon { transform: translateX(5px); }
    .action-btn { display: flex; }

    .review-item {
      background-color: #fffbeb;
      border-left: 4px solid #f59e0b;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 4px;
      font-size: 14px;
    }
    .review-answer { color: #ef4444; font-weight: bold; margin-top: 8px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="app-container">
    <h1>📝 オリジナルTOEICテスト</h1>

    <div id="quiz-screen">
      <div class="question-area">
        <div id="q-number" class="question-number">Question 1 / 3</div>
        <div id="q-text" class="question-text">読み込み中...</div>
      </div>
      <div id="choices" class="choices-container">
      </div>
      <div id="feedback" class="feedback"></div>
      
      <button id="next-btn" class="next-btn" onclick="nextQuestion()">
        次の問題へ
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>

    <div id="result-screen" class="hidden">
      <h2 style="text-align: center;">テスト終了！</h2>
      <p id="score-text" style="text-align: center; font-size: 24px; font-weight: bold; margin: 20px 0;"></p>
      
      <div id="review-area" class="hidden">
        <h3 style="font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 5px;">復習リスト（間違えた問題）</h3>
        <div id="review-list"></div>
      </div>

      <button class="action-btn" onclick="location.reload()" style="margin-top: 30px;">
        最初からやり直す
      </button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        id: 1,
        question: "The new software is designed to _______ the accounting process.",
        choices: ["streamline", "streamlines", "streamlined", "streamlining"],
        answerIndex: 0
      },
      {
        id: 2,
        question: "Please ensure that all doors are locked _______ leaving the building.",
        choices: ["before", "after", "during", "while"],
        answerIndex: 0
      },
      {
        id: 3,
        question: "Mr. Lee _______ the marketing department since last year.",
        choices: ["manages", "managed", "has managed", "will manage"],
        answerIndex: 2
      }
    ];

    let currentIndex = 0;
    let score = 0;
    let mistakes = [];

    const qNumberEl = document.getElementById('q-number');
    const qTextEl = document.getElementById('q-text');
    const choicesEl = document.getElementById('choices');
    const feedbackEl = document.getElementById('feedback');
    const nextBtnEl = document.getElementById('next-btn');

    function loadQuestion() {
      const currentQ = quizData[currentIndex];
      qNumberEl.textContent = `Question ${currentIndex + 1} / ${quizData.length}`;
      qTextEl.textContent = currentQ.question;
      
      choicesEl.innerHTML = '';
      feedbackEl.textContent = '';
      nextBtnEl.style.display = 'none';

      currentQ.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.textContent = choice;
        btn.className = 'choice-btn';
        btn.onclick = () => checkAnswer(index, btn);
        choicesEl.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex, selectedBtn) {
      const currentQ = quizData[currentIndex];
      const buttons = choicesEl.querySelectorAll('.choice-btn');
      
      buttons.forEach(btn => btn.disabled = true);

      if (selectedIndex === currentQ.answerIndex) {
        selectedBtn.classList.add('correct');
        feedbackEl.textContent = '⭕️ Correct!';
        feedbackEl.className = 'feedback text-green';
        score++;
      } else {
        selectedBtn.classList.add('wrong');
        buttons[currentQ.answerIndex].classList.add('correct');
        feedbackEl.textContent = '❌ Incorrect';
        feedbackEl.className = 'feedback text-red';
        mistakes.push(currentQ);
      }

      nextBtnEl.style.display = 'flex';
    }

    function nextQuestion() {
      currentIndex++;
      if (currentIndex < quizData.length) {
        loadQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      
      document.getElementById('score-text').textContent = `${quizData.length}問中 ${score}問 正解！`;

      if (mistakes.length > 0) {
        document.getElementById('review-area').classList.remove('hidden');
        const reviewListEl = document.getElementById('review-list');
        mistakes.forEach(q => {
          const item = document.createElement('div');
          item.className = 'review-item';
          const correctAnswerText = q.choices[q.answerIndex];
          item.innerHTML = `
            <div>${q.question}</div>
            <div class="review-answer">正解: ${correctAnswerText}</div>
          `;
          reviewListEl.appendChild(item);
        });
      }
    }

    loadQuestion();
  </script>
</body>
</html>
